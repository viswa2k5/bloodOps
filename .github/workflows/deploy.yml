name: BloodOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy BloodOps to AWS
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo bash -s -- --install-method standalone
          tofu version

      - name: Build reportlab Lambda Layer
        run: |
          mkdir -p terraform/layer/python
          pip install reportlab -t terraform/layer/python/
          cd terraform/layer
          zip -r ../reportlab_layer.zip python/
          cd ../..

      - name: Create zips directory
        run: mkdir -p terraform/zips

      - name: Tofu Init
        working-directory: terraform
        run: tofu init

      - name: Import existing resources into state
        working-directory: terraform
        run: |
          echo "Importing IAM roles..."
          tofu import aws_iam_role.lambda_role bloodops-lambda-role 2>/dev/null || true
          tofu import aws_iam_role.eventbridge_role bloodops-eventbridge-role 2>/dev/null || true

          echo "Importing IAM policies..."
          tofu import aws_iam_role_policy.lambda_policy bloodops-lambda-role:bloodops-lambda-policy 2>/dev/null || true
          tofu import aws_iam_role_policy.eventbridge_policy bloodops-eventbridge-role:bloodops-eventbridge-policy 2>/dev/null || true

          echo "Importing Lambda functions..."
          tofu import aws_lambda_function.donor_function bloodops-donor-function 2>/dev/null || true
          tofu import aws_lambda_function.request_function bloodops-request-function 2>/dev/null || true
          tofu import aws_lambda_function.match_function bloodops-match-function 2>/dev/null || true
          tofu import aws_lambda_function.history_function bloodops-history-function 2>/dev/null || true
          tofu import aws_lambda_function.certificate_function bloodops-certificate-function 2>/dev/null || true
          tofu import aws_lambda_function.reminder_function bloodops-reminder-function 2>/dev/null || true
          tofu import aws_lambda_function.admin_function bloodops-admin-function 2>/dev/null || true

          echo "Importing CloudWatch log groups..."
          tofu import aws_cloudwatch_log_group.donor_logs /aws/lambda/bloodops-donor-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.request_logs /aws/lambda/bloodops-request-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.match_logs /aws/lambda/bloodops-match-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.history_logs /aws/lambda/bloodops-history-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.certificate_logs /aws/lambda/bloodops-certificate-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.reminder_logs /aws/lambda/bloodops-reminder-function 2>/dev/null || true
          tofu import aws_cloudwatch_log_group.admin_logs /aws/lambda/bloodops-admin-function 2>/dev/null || true

          echo "Importing SNS topics..."
          tofu import aws_sns_topic.urgent_alerts arn:aws:sns:us-east-1:065837433541:urgent-blood-alerts 2>/dev/null || true
          tofu import aws_sns_topic.reminder_alerts arn:aws:sns:us-east-1:065837433541:reminder-alerts 2>/dev/null || true
          tofu import aws_sns_topic.admin_notifications arn:aws:sns:us-east-1:065837433541:admin-notifications 2>/dev/null || true

          echo "Importing API Gateway..."
          tofu import aws_api_gateway_rest_api.bloodops_api xztk3lgyvc 2>/dev/null || true

          echo "Importing EventBridge schedule..."
          tofu import aws_scheduler_schedule.daily_reminder bloodops-daily-reminder 2>/dev/null || true

          echo "Importing Lambda permissions..."
          tofu import aws_lambda_permission.donor_api_permission bloodops-donor-function/AllowAPIGatewayInvokeDonor 2>/dev/null || true
          tofu import aws_lambda_permission.request_api_permission bloodops-request-function/AllowAPIGatewayInvokeRequest 2>/dev/null || true
          tofu import aws_lambda_permission.match_api_permission bloodops-match-function/AllowAPIGatewayInvokeMatch 2>/dev/null || true
          tofu import aws_lambda_permission.history_api_permission bloodops-history-function/AllowAPIGatewayInvokeHistory 2>/dev/null || true
          tofu import aws_lambda_permission.certificate_api_permission bloodops-certificate-function/AllowAPIGatewayInvokeCertificate 2>/dev/null || true
          tofu import aws_lambda_permission.admin_api_permission bloodops-admin-function/AllowAPIGatewayInvoke 2>/dev/null || true

          echo "Importing CloudWatch alarms..."
          tofu import aws_cloudwatch_metric_alarm.donor_function_errors bloodops-donor-function-errors 2>/dev/null || true
          tofu import aws_cloudwatch_metric_alarm.request_function_errors bloodops-request-function-errors 2>/dev/null || true
          tofu import aws_cloudwatch_metric_alarm.match_function_errors bloodops-match-function-errors 2>/dev/null || true

          echo "All imports done!"

      - name: Tofu Plan
        working-directory: terraform
        run: tofu plan

      - name: Tofu Apply
        working-directory: terraform
        run: tofu apply -auto-approve

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://bloodops-frontend-bucket/ \
            --exclude "admin.html" \
            --delete