name: BloodOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy BloodOps to AWS
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo bash -s -- --install-method standalone
          tofu version

      - name: Cleanup existing AWS resources
        run: |
          echo "Deleting Lambda functions..."
          aws lambda delete-function --function-name bloodops-donor-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-request-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-match-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-history-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-certificate-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-reminder-function 2>/dev/null || true
          aws lambda delete-function --function-name bloodops-admin-function 2>/dev/null || true
          echo "Deleting IAM roles..."
          aws iam delete-role-policy --role-name bloodops-lambda-role --policy-name bloodops-lambda-policy 2>/dev/null || true
          aws iam delete-role --role-name bloodops-lambda-role 2>/dev/null || true
          aws iam delete-role-policy --role-name bloodops-eventbridge-role --policy-name bloodops-eventbridge-policy 2>/dev/null || true
          aws iam delete-role --role-name bloodops-eventbridge-role 2>/dev/null || true
          echo "Deleting CloudWatch log groups..."
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-donor-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-request-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-match-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-history-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-certificate-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-reminder-function 2>/dev/null || true
          aws logs delete-log-group --log-group-name /aws/lambda/bloodops-admin-function 2>/dev/null || true
          echo "Cleanup complete!"

      - name: Build reportlab Lambda Layer
        run: |
          mkdir -p terraform/layer/python
          pip install reportlab -t terraform/layer/python/
          cd terraform/layer
          zip -r ../reportlab_layer.zip python/
          cd ../..

      - name: Create zips directory
        run: mkdir -p terraform/zips

      - name: Tofu Init
        working-directory: terraform
        run: tofu init

      - name: Tofu Plan
        working-directory: terraform
        run: tofu plan

      - name: Tofu Apply
        working-directory: terraform
        run: tofu apply -auto-approve

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://bloodops-frontend-bucket/ \
            --exclude "admin.html" \
            --delete