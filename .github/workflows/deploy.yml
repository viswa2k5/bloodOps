name: BloodOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy BloodOps to AWS
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install OpenTofu
        run: |
          curl -fsSL https://get.opentofu.org/install-opentofu.sh | sudo bash -s -- --install-method standalone
          tofu version

      - name: Cleanup ALL existing AWS resources
        run: |
          echo "Deleting Lambda functions..."
          for fn in bloodops-donor-function bloodops-request-function bloodops-match-function bloodops-history-function bloodops-certificate-function bloodops-reminder-function bloodops-admin-function; do
            aws lambda delete-function --function-name $fn 2>/dev/null && echo "Deleted $fn" || echo "Skipped $fn"
          done

          echo "Deleting Lambda layers..."
          for v in 1 2 3 4 5; do
            aws lambda delete-layer-version --layer-name reportlab-layer --version-number $v 2>/dev/null || true
          done

          echo "Deleting IAM roles..."
          aws iam delete-role-policy --role-name bloodops-lambda-role --policy-name bloodops-lambda-policy 2>/dev/null || true
          aws iam delete-role --role-name bloodops-lambda-role 2>/dev/null || true
          aws iam delete-role-policy --role-name bloodops-eventbridge-role --policy-name bloodops-eventbridge-policy 2>/dev/null || true
          aws iam delete-role --role-name bloodops-eventbridge-role 2>/dev/null || true

          echo "Deleting CloudWatch log groups..."
          for fn in bloodops-donor-function bloodops-request-function bloodops-match-function bloodops-history-function bloodops-certificate-function bloodops-reminder-function bloodops-admin-function; do
            aws logs delete-log-group --log-group-name /aws/lambda/$fn 2>/dev/null && echo "Deleted log group $fn" || echo "Skipped log group $fn"
          done

          echo "Deleting EventBridge schedule..."
          aws scheduler delete-schedule --name bloodops-daily-reminder 2>/dev/null || true

          echo "Deleting CloudWatch alarms..."
          aws cloudwatch delete-alarms --alarm-names bloodops-donor-function-errors bloodops-request-function-errors bloodops-match-function-errors 2>/dev/null || true

          echo "Deleting SNS topics..."
          for topic in urgent-blood-alerts reminder-alerts admin-notifications; do
            ARN=$(aws sns list-topics --query "Topics[?contains(TopicArn, '$topic')].TopicArn" --output text 2>/dev/null)
            if [ -n "$ARN" ]; then
              aws sns delete-topic --topic-arn $ARN 2>/dev/null && echo "Deleted SNS $topic" || true
            fi
          done

          echo "Deleting API Gateway..."
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='bloodops-api'].id" --output text 2>/dev/null)
          if [ -n "$API_ID" ]; then
            aws apigateway delete-rest-api --rest-api-id $API_ID 2>/dev/null && echo "Deleted API Gateway" || true
          fi

          echo "All cleanup done!"

      - name: Build reportlab Lambda Layer
        run: |
          mkdir -p terraform/layer/python
          pip install reportlab -t terraform/layer/python/
          cd terraform/layer
          zip -r ../reportlab_layer.zip python/
          cd ../..

      - name: Create zips directory
        run: mkdir -p terraform/zips

      - name: Tofu Init
        working-directory: terraform
        run: tofu init

      - name: Tofu Plan
        working-directory: terraform
        run: tofu plan

      - name: Tofu Apply
        working-directory: terraform
        run: tofu apply -auto-approve

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/ s3://bloodops-frontend-bucket/ \
            --exclude "admin.html" \
            --delete